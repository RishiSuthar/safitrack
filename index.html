<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafiTrack — AI-Powered Field Sales</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- LOADING SCREEN WITH SKELETON -->
  <div id="loading-screen" class="loading-overlay active">
    <div class="skeleton-loader">
      <div class="skeleton-header"></div>
      <div class="skeleton-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>
    <p>Initializing SafiTrack&trade; with AI...</p>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen center-screen">
    <div class="auth-card glass-card">
      <div class="logo-container">
        <img src="assets/logo.svg" alt="SafiTrack" width="60">
        <h1>SafiTrack</h1>
      </div>
      <p class="subtitle">Field Intelligence. Verified by AI.</p>
      
      <div class="auth-toggle">
        <button id="toggle-login" class="tab-btn active">Login</button>
        <button id="toggle-signup" class="tab-btn">Sign Up</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email" />
        <div class="password-wrapper">
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
          <button type="button" class="toggle-password">👁️</button>
        </div>
        <button type="submit" class="btn primary full-width">Log In</button>
      </form>

      <form id="signup-form" class="auth-form" style="display:none;">
        <input type="text" id="signup-name" placeholder="Full Name" required />
        <input type="email" id="signup-email" placeholder="Email" required />
        <div class="password-wrapper">
          <input type="password" id="signup-password" placeholder="Password (min 8 chars)" required minlength="8" />
          <button type="button" class="toggle-password">👁️</button>
        </div>
        <select id="signup-role" required>
          <option value="" disabled selected>Select Role</option>
          <option value="sales_rep">Field Sales Rep</option>
          <option value="manager">Sales Manager</option>
        </select>
        <button type="submit" class="btn primary full-width">Create Account</button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>
      <button class="btn google-btn full-width">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="screen" style="display:none;">
    <header class="app-header">
      <div class="header-left">
        <img src="assets/logo.svg" alt="SafiTrack" width="40" class="header-logo">
        <h1>SafiTrack</h1>
        <nav class="breadcrumb" id="breadcrumb-nav">
          <span class="breadcrumb-item active">Dashboard</span>
        </nav>
      </div>
      <div class="header-right">
        <button id="command-palette-btn" class="icon-btn" title="Command Palette (Ctrl+K)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        </button>
        <button id="export-btn" class="icon-btn" title="Export Reports">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <span id="user-display" class="user-badge"></span>
        <button id="logout-btn" class="btn secondary small">Logout</button>
      </div>
    </header>

    <nav class="app-nav">
      <button data-view="log-visit" class="nav-btn active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14m7-7H5"></path></svg>
        Log Visit
      </button>
      <button data-view="my-activity" class="nav-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18M9 14h.01M9 18h.01M15 14h.01M15 18h.01"></path></svg>
        My Activity
      </button>
      <button data-view="sales-funnel" class="nav-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        Sales Funnel
      </button>
      <button data-view="team-dashboard" id="manager-view" class="nav-btn" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Team Dashboard
      </button>
      <button data-view="user-management" id="admin-view" class="nav-btn" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
        Users
      </button>
      <div class="nav-indicator"></div>
    </nav>

    <main id="view-container" class="main-content">
      <!-- Dynamic Views Rendered Here -->
    </main>
  </div>

  <!-- COMMAND PALETTE -->
  <div id="command-palette" class="command-palette" style="display:none;">
    <div class="command-palette-backdrop"></div>
    <div class="command-palette-container">
      <div class="command-palette-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        <input type="text" id="command-input" placeholder="Type a command or search..." autocomplete="off">
        <button id="close-command-palette" class="icon-btn">✕</button>
      </div>
      <div class="command-palette-results" id="command-results">
        <!-- Results populated dynamically -->
      </div>
    </div>
  </div>

  <!-- EXPORT MODAL -->
  <div id="export-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h3>Export Reports</h3>
        <button class="icon-btn" onclick="closeModal('export-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Export Format</label>
          <select id="export-format">
            <option value="pdf">PDF Report</option>
            <option value="excel">Excel Spreadsheet</option>
            <option value="csv">CSV File</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date Range</label>
          <div class="date-range-picker">
            <button class="btn secondary small" onclick="setDateRange('today')">Today</button>
            <button class="btn secondary small" onclick="setDateRange('week')">Last 7 Days</button>
            <button class="btn secondary small" onclick="setDateRange('month')">This Month</button>
            <button class="btn secondary small" onclick="setDateRange('quarter')">This Quarter</button>
            <button class="btn secondary small" onclick="setDateRange('custom')">Custom Range</button>
          </div>
        </div>
        <div id="custom-date-range" class="form-group" style="display:none;">
          <label>From</label>
          <input type="date" id="export-date-from">
          <label>To</label>
          <input type="date" id="export-date-to">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal('export-modal')">Cancel</button>
        <button class="btn primary" onclick="executeExport()">Export</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toast-container"></div>

  <!-- Pull to Refresh Indicator -->
  <div id="pull-to-refresh" class="pull-to-refresh">
    <div class="pull-to-refresh-icon">↓</div>
    <span>Pull to refresh</span>
  </div>

  <!-- EXTERNAL LIBRARIES -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- OUR SCRIPTS -->
  <script src="utils.js"></script>
  <script src="ai.js"></script>
  <script src="app.js"></script>
</body>
</html>
