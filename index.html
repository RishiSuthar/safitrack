<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SafiTrack — AI-Powered Field Sales</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-overlay active">
    <div class="loading-content">
      <div class="loading-logo">
        <img src="assets/logo.svg" alt="SafiTrack" width="64">
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-text">Initializing SafiTrack&trade;</p>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen auth-screen">
    <div class="auth-container">
      <div class="auth-hero">
        <div class="auth-hero-content">
          <img src="assets/logo.svg" alt="SafiTrack" width="80">
          <h1>SafiTrack</h1>
          <p>Field Intelligence. Verified by AI.</p>
        </div>
        <div class="auth-hero-bg"></div>
      </div>
      
      <div class="auth-form-container">
        <div class="auth-card">
          <div class="auth-tabs">
            <button id="toggle-login" class="auth-tab active">Sign In</button>
            <button id="toggle-signup" class="auth-tab">Create Account</button>
          </div>

          <form id="login-form" class="auth-form">
            <div class="form-field">
              <label for="login-email">Email</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email" />
              </div>
            </div>
            <div class="form-field">
              <label for="login-password">Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" />
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">
              <span>Sign In</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <form id="signup-form" class="auth-form" style="display:none;">
            <div class="form-field">
              <label for="signup-name">Full Name</label>
              <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="signup-name" placeholder="Enter your full name" required />
              </div>
            </div>
            <div class="form-field">
              <label for="signup-email">Email</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="signup-email" placeholder="Enter your email" required />
              </div>
            </div>
            <div class="form-field">
              <label for="signup-password">Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="signup-password" placeholder="Min 8 characters" required minlength="8" />
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="signup-role">Role</label>
              <div class="input-wrapper">
                <i class="fas fa-briefcase"></i>
                <select id="signup-role" required>
                  <option value="" disabled selected>Select your role</option>
                  <option value="sales_rep">Field Sales Rep</option>
                  <option value="manager">Sales Manager</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">
              <span>Create Account</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>
          
          <button class="btn btn-google btn-block">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Google</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="screen main-app" style="display:none;">
    <!-- Mobile Header -->
    <header class="app-header">
      <div class="header-left">
        <button id="mobile-menu-toggle" class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
        <div class="header-brand">
          <img src="assets/logo.svg" alt="SafiTrack" width="32">
          <span class="brand-name">SafiTrack</span>
        </div>
      </div>
      <div class="header-right">
        <button id="command-palette-btn" class="header-icon-btn" title="Search (Ctrl+K)">
          <i class="fas fa-search"></i>
        </button>
        <button id="theme-toggle" class="header-icon-btn" title="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <div class="user-menu" id="user-menu">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <span class="user-avatar" id="user-avatar">JD</span>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <div class="user-dropdown-header">
              <span class="user-name" id="user-display-name">John Doe</span>
              <span class="user-email" id="user-display-email">john@example.com</span>
            </div>
            <div class="user-dropdown-divider"></div>
            <button id="export-btn" class="user-dropdown-item">
              <i class="fas fa-download"></i>
              <span>Export Reports</span>
            </button>
            <button id="logout-btn" class="user-dropdown-item user-dropdown-item-danger">
              <i class="fas fa-sign-out-alt"></i>
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <nav class="sidebar-nav">
        <div class="sidebar-header">
          <img src="assets/logo.svg" alt="SafiTrack" width="40">
          <span>SafiTrack</span>
          <button class="sidebar-close" id="sidebar-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <div class="nav-section">
          <span class="nav-section-title">Main Menu</span>
          <button data-view="log-visit" class="nav-item active">
            <i class="fas fa-plus-circle"></i>
            <span>Log Visit</span>
          </button>
          <button data-view="my-activity" class="nav-item">
            <i class="fas fa-clipboard-list"></i>
            <span>My Activity</span>
          </button>
          <button data-view="sales-funnel" class="nav-item">
            <i class="fas fa-filter"></i>
            <span>Sales Funnel</span>
          </button>
        </div>
        
        <div class="nav-section" id="manager-nav-section" style="display:none;">
          <span class="nav-section-title">Management</span>
          <button data-view="team-dashboard" id="manager-view" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Team Dashboard</span>
          </button>
          <button data-view="user-management" id="admin-view" class="nav-item">
            <i class="fas fa-user-cog"></i>
            <span>User Management</span>
          </button>
        </div>

        <div class="sidebar-footer">
          <div class="sidebar-user">
            <span class="user-avatar" id="sidebar-user-avatar">JD</span>
            <div class="sidebar-user-info">
              <span class="sidebar-user-name" id="sidebar-user-name">John Doe</span>
              <span class="sidebar-user-role" id="sidebar-user-role">Sales Rep</span>
            </div>
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content" id="view-container">
      <!-- Dynamic Views Rendered Here -->
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
      <button data-view="log-visit" class="bottom-nav-item active">
        <i class="fas fa-plus-circle"></i>
        <span>Log</span>
      </button>
      <button data-view="my-activity" class="bottom-nav-item">
        <i class="fas fa-clipboard-list"></i>
        <span>Activity</span>
      </button>
      <button data-view="sales-funnel" class="bottom-nav-item">
        <i class="fas fa-filter"></i>
        <span>Funnel</span>
      </button>
      <button data-view="team-dashboard" class="bottom-nav-item manager-only" style="display:none;">
        <i class="fas fa-users"></i>
        <span>Team</span>
      </button>
    </nav>
  </div>

  <!-- COMMAND PALETTE -->
  <div id="command-palette" class="command-palette" style="display:none;">
    <div class="command-palette-backdrop"></div>
    <div class="command-palette-container">
      <div class="command-palette-header">
        <i class="fas fa-search"></i>
        <input type="text" id="command-input" placeholder="Search or type a command..." autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="command-palette-results" id="command-results"></div>
    </div>
  </div>

  <!-- EXPORT MODAL -->
  <div id="export-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h3><i class="fas fa-download"></i> Export Reports</h3>
        <button class="modal-close" onclick="closeModal('export-modal')">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>Export Format</label>
          <div class="export-format-grid">
            <label class="export-format-option">
              <input type="radio" name="export-format" value="pdf" checked>
              <div class="export-format-card">
                <i class="fas fa-file-pdf"></i>
                <span>PDF Report</span>
              </div>
            </label>
            <label class="export-format-option">
              <input type="radio" name="export-format" value="excel">
              <div class="export-format-card">
                <i class="fas fa-file-excel"></i>
                <span>Excel</span>
              </div>
            </label>
            <label class="export-format-option">
              <input type="radio" name="export-format" value="csv">
              <div class="export-format-card">
                <i class="fas fa-file-csv"></i>
                <span>CSV</span>
              </div>
            </label>
          </div>
        </div>
        <div class="form-field">
          <label>Date Range</label>
          <div class="date-range-buttons">
            <button class="date-range-btn active" onclick="setDateRange('today', this)">Today</button>
            <button class="date-range-btn" onclick="setDateRange('week', this)">7 Days</button>
            <button class="date-range-btn" onclick="setDateRange('month', this)">Month</button>
            <button class="date-range-btn" onclick="setDateRange('quarter', this)">Quarter</button>
          </div>
        </div>
        <div id="custom-date-range" class="form-field" style="display:none;">
          <div class="date-inputs">
            <div>
              <label>From</label>
              <input type="date" id="export-date-from">
            </div>
            <div>
              <label>To</label>
              <input type="date" id="export-date-to">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('export-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="executeExport()">
          <i class="fas fa-download"></i>
          Export
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toast-container"></div>

  <!-- EXTERNAL LIBRARIES -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- OUR SCRIPTS -->
  <script src="utils.js"></script>
  <script src="ai.js"></script>
  <script src="app.js"></script>
</body>
</html>
