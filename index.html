<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SafiTrack - Field Sales</title>
  <link rel="icon" href="assets/icons/whiteblue.ico" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <!-- Add this to your HTML head -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
</head>
<body>
  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-overlay active">
    <div class="loading-content">
      <div class="loading-logo">
        <img src="assets/icons/whiteblue.png" alt="SafiTrack" width="64">
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-text">Initializing safitrack</p>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen auth-screen">
    <div class="auth-container">
      <div class="auth-hero">
        <div class="auth-hero-content">
          <img src="assets/illustrations/test2.gif" alt="SafiTrack" width="1000" height="800">
        </div>
        <div class="auth-hero-bg"></div>
      </div>
            
      <div class="auth-form-container">
        <div class="auth-card">
          <!-- Replace the single logo with this dual-logo container -->
          <div class="auth-logos">
            <div class="auth-logo">
              <img src="assets/icons/transparentMain.png" alt="SafiTrack" width="150">
            </div>
            <div class="auth-logo">
              <!-- You'll need to add Sangyug Enterprises logo to your assets -->
              <img src="assets/icons/sangyug-logo.png" alt="Sangyug Enterprises" width="150">
            </div>
          </div>
          
          <!-- Add a subtitle below the logos -->
          <div class="auth-subtitle">
            <p>Smart Selling, Powered by Data</p>
          </div>

          <form id="login-form" class="auth-form">
            <!-- Rest of your form remains the same -->
            <div class="form-field">
              <label for="login-email">Email</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email" />
              </div>
            </div>
            <div class="form-field">
              <label for="login-password">Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" />
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">
              <span>Sign In</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="screen main-app" style="display:none;">
    <!-- Mobile Header -->
    <header class="app-header">
      <div class="header-left">
        <button id="mobile-menu-toggle" class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
        <div class="header-brand">
          <img src="assets/icons/transparentMain.png" alt="SafiTrack" width="150">
        </div>
      </div>
      <div class="header-right">
        <button id="command-palette-btn" class="header-icon-btn" title="Search (Ctrl+K)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
        </button>
        <button id="theme-toggle" class="header-icon-btn" title="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <div class="user-menu" id="user-menu">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <span class="user-avatar" id="user-avatar">JD</span>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <div class="user-dropdown-header">
              <span class="user-name" id="user-display-name">John Doe</span>
              <span class="user-display-email" id="user-display-email">john@example.com</span>
            </div>
            <div class="user-dropdown-divider"></div>
            <button id="export-btn" class="user-dropdown-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download-icon lucide-download"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
              <span>Export Reports</span>
            </button>
            <button id="logout-btn" class="user-dropdown-item user-dropdown-item-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out-icon lucide-log-out"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </header>

        <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <nav class="sidebar-nav">

            <span>Opportunities</span>
          </button>
          <!-- Replaced fa-route with img -->

          <button data-view="technicians-dashboard" class="nav-item" id="technicians-dashboard-view">

            <span>Technicians</span>
          </button>

        </div>
        
        <div class="nav-section" id="manager-nav-section" style="display:none;">
          <span class="nav-section-title">Management</span>
          <!-- Replaced fa-tv with img -->
          <button data-view="team-dashboard" id="manager-view" class="nav-item">

          <!-- Replaced fa-map with img -->

          </button>
          <!-- My Service Visits -->

            <span>Companies</span>

                <!-- body -->

              </svg>
            </span>
            <span>People</span>
          </button>

          <!-- Replaced fa-user with img -->
          <button data-view="user-management" id="admin-view" class="nav-item">

        <div class="sidebar-footer">

          </div>
        </div>
      </nav>

      <!-- Dynamic Views Rendered Here -->

        <span>Pipeline</span>

      <button data-view="team-dashboard" class="bottom-nav-item manager-only" style="display:none;">

  <!-- COMMAND PALETTE -->
  <div id="command-palette" class="command-palette" style="display:none;">
    <div class="command-palette-backdrop"></div>
    <div class="command-palette-container">
      <div class="command-palette-header">
        <i class="fas fa-search"></i>
        <input type="text" id="command-input" placeholder="Search or type a command..." autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="command-palette-results" id="command-results"></div>
    </div>
  </div>

  <!-- EXPORT MODAL -->
  <div id="export-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h3><i class="fas fa-download"></i> Export Reports</h3>
        <button class="modal-close" onclick="closeModal('export-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>Export Format</label>
          <div class="export-format-grid">
            <label class="export-format-option">
              <input type="radio" name="export-format" value="pdf" checked>
              <div class="export-format-card">
                <i class="fas fa-file-pdf"></i>
                <span>PDF Report</span>
              </div>
            </label>
            <label class="export-format-option">
              <input type="radio" name="export-format" value="excel">
              <div class="export-format-card">
                <i class="fas fa-file-excel"></i>
                <span>Excel</span>
              </div>
            </label>
            <label class="export-format-option">
              <input type="radio" name="export-format" value="csv">
              <div class="export-format-card">
                <i class="fas fa-file-csv"></i>
                <span>CSV</span>
              </div>
            </label>
          </div>
        </div>
        <div class="form-field">
          <label>Date Range</label>
          <div class="date-range-buttons">
            <button class="date-range-btn active" onclick="setDateRange('today', this)">Today</button>
            <button class="date-range-btn" onclick="setDateRange('week', this)">7 Days</button>
            <button class="date-range-btn" onclick="setDateRange('month', this)">Month</button>
            <button class="date-range-btn" onclick="setDateRange('quarter', this)">Quarter</button>
          </div>
        </div>
        <div id="custom-date-range" class="form-field" style="display:none;">
          <div class="date-inputs">
            <div>
              <label>From</label>
              <input type="date" id="export-date-from">
            </div>
            <div>
              <label>To</label>
              <input type="date" id="export-date-to">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('export-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="executeExport()">
          <i class="fas fa-download"></i>
          Export
        </button>
      </div>
    </div>
  </div>

  <!-- COMPANY MODAL -->
  <div id="company-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="company-modal-title">New Company</h3>
        <button class="modal-close" onclick="closeModal('company-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label for="company-name-input">Company Name *</label>
          <input type="text" id="company-name-input" placeholder="e.g., Acme Corporation" required>
        </div>
        
        <div class="form-field">
          <label for="company-description">Description</label>
          <textarea id="company-description" placeholder="Brief description of company..." rows="3"></textarea>
        </div>
        
        <div class="form-field">
          <label for="company-address">Location Address *</label>
          <input type="text" id="company-address" placeholder="e.g., 123 Main St, City, Country" required>
        </div>

        <div class="form-field">
          <label>Location Coordinates</label>
          <div class="coord-inputs">
            <div class="coord-input-group">
              <input type="number" id="company-latitude" placeholder="Latitude" step="0.000001">
              <input type="number" id="company-longitude" placeholder="Longitude" step="0.000001">
            </div>
            <div class="coord-buttons">
              <button type="button" id="geocode-address-btn" class="btn btn-secondary">
                <i class="fas fa-map-marker-alt"></i>
                <span>Geocode Address</span>
              </button>
              <button type="button" id="use-current-location-btn" class="btn btn-secondary">
                <i class="fas fa-crosshairs"></i>
                <span>Use Current Location</span>
              </button>
            </div>
          </div>
        </div>

        <div class="form-field">
          <label for="company-radius">Verification Radius (meters)</label>
          <input type="number" id="company-radius" value="200" min="50" max="1000">
        </div>
        
        <div class="form-field">
          <label>Categories</label>
          <div class="categories-input-container" id="categories-container">
            <input type="text" class="categories-input" id="categories-input" placeholder="Add category...">
          </div>
          <div class="category-suggestions">
            <button type="button" class="tag-suggestion" onclick="addCategory('Technology')">Technology</button>
            <button type="button" class="tag-suggestion" onclick="addCategory('Manufacturing')">Manufacturing</button>
            <button type="button" class="tag-suggestion" onclick="addCategory('Healthcare')">Healthcare</button>
            <button type="button" class="tag-suggestion" onclick="addCategory('Finance')">Finance</button>
            <button type="button" class="tag-suggestion" onclick="addCategory('Retail')">Retail</button>
          </div>
        </div>

        <div id="manual-coords-section" class="manual-coords-section hidden">
          <div class="form-field">
            <label>Manual Coordinates</label>
            <div class="coord-inputs">
              <div class="coord-input-group">
                <input type="number" id="company-latitude" placeholder="Latitude" step="0.000001">
                <input type="number" id="company-longitude" placeholder="Longitude" step="0.000001">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('company-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-company-btn">Save Company</button>
      </div>
    </div>
  </div>

  <!-- PERSON MODAL -->
  <div id="person-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="person-modal-title">New Person</h3>
        <button class="modal-close" onclick="closeModal('person-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label for="person-name">Name *</label>
          <input type="text" id="person-name" placeholder="Enter person's name" required>
        </div>
        
        <div class="form-field">
          <label for="person-email">Email Address</label>
          <input type="email" id="person-email" placeholder="Enter email address">
        </div>
        
        <div class="form-field">
          <label for="person-company">Company *</label>
          <select id="person-company" required>
            <option value="">Select a company</option>
          </select>
        </div>
        
        <div class="form-field">
          <label for="person-job-title">Job Title</label>
          <input type="text" id="person-job-title" placeholder="Enter job title">
        </div>
        
        <div class="form-field">
          <label for="person-phone">Phone Numbers</label>
          <div class="phone-numbers-container" id="phone-numbers-container">
            <div class="phone-number-input">
              <input type="tel" class="phone-number" placeholder="Enter phone number">
              <button type="button" class="btn btn-sm btn-ghost add-phone-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
              </button>
            </div>
          </div>
        </div>
        
        <div class="form-field">
          <label for="person-opportunity">Opportunity</label>
          <select id="person-opportunity">
            <option value="">Select an opportunity</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('person-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-person-btn">
          Save Person
        </button>
      </div>
    </div>
  </div>

  <!-- OPPORTUNITY MODAL -->
  <div id="opportunity-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="opportunity-modal-title">New Opportunity</h3>
        <button class="modal-close" onclick="closeModal('opportunity-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label for="opportunity-name">Opportunity Name *</label>
          <input type="text" id="opportunity-name" placeholder="e.g., Q4 Enterprise Software Deal" required>
        </div>
        
        <div class="form-field">
          <label for="opportunity-company">Company *</label>
          <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="opportunity-company" placeholder="Search for a company..." required>
            <div id="opportunity-company-search-results" class="search-results" style="display: none;"></div>
          </div>
        </div>
        
        <div class="form-field">
          <label for="opportunity-value">Deal Value (Ksh) *</label>
          <input type="number" id="opportunity-value" placeholder="0.00" min="0" step="0.01" required>
        </div>
        
        <div class="form-field">
          <label for="opportunity-probability">Win Probability (%) *</label>
          <div class="probability-slider-container">
            <input type="range" id="opportunity-probability" min="0" max="100" value="50" class="probability-slider">
            <div class="probability-value"><span id="probability-display">50</span>%</div>
          </div>
        </div>
        
        <div class="form-field">
          <label for="opportunity-stage">Pipeline Stage *</label>
          <select id="opportunity-stage" required>
            <option value="prospecting">Discovery</option>
            <option value="qualification">In Progress</option>
            <option value="closed-won">Won/Invoiced 🎉</option>
            <option value="closed-lost">Lost</option>
          </select>
        </div>
                
        <div class="form-field">
          <label for="opportunity-next-step">Next Step</label>
          <input type="text" id="opportunity-next-step" placeholder="e.g., Schedule demo with decision makers">
        </div>
        
        <div class="form-field">
          <label for="opportunity-next-step-date">Next Step Due Date</label>
          <input type="date" id="opportunity-next-step-date">
        </div>
        
        <div class="form-field">
          <label for="opportunity-competitors">Competitors</label>
          <div class="competitors-input-container" id="competitors-container">
            <input type="text" class="competitors-input" id="competitors-input" placeholder="Add competitor...">
          </div>
        </div>
        
        <div class="form-field">
          <label for="opportunity-notes">Notes</label>
          <div class="mention-container">
            <textarea id="opportunity-notes" placeholder="Additional details about this opportunity..." rows="3"></textarea>
            <div id="opportunity-mention-suggestions" class="mention-suggestions" style="display: none;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('opportunity-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-opportunity-btn">
          Save Opportunity
        </button>
      </div>
    </div>
  </div>

  <!-- TASK MODAL -->
  <div id="task-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="task-modal-title"><i class="fa-solid fa-bars-progress"></i></i> New Task</h3>
        <button class="modal-close" onclick="closeModal('task-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label for="task-title">Task Title *</label>
          <input type="text" id="task-title" placeholder="Enter task title" required>
        </div>
        
        <div class="form-field">
          <label for="task-description">Description</label>
          <textarea id="task-description" placeholder="Enter task description" rows="3"></textarea>
        </div>
        
        <div class="form-field" id="task-assign-field" style="display:none;">
          <label for="task-assign-to">Assign To</label>
          <select id="task-assign-to">
            <option value="">Select a sales rep</option>
          </select>
        </div>
        
        <div class="form-field">
          <label for="task-due-date">Due Date</label>
          <input type="datetime-local" id="task-due-date">
        </div>
        
        <div class="form-field">
          <label for="task-priority">Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        
        <div class="form-field">
          <label for="task-status">Status</label>
          <select id="task-status">
            <option value="pending" selected>Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('task-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-task-btn">
          Save Task
        </button>
      </div>
    </div>
  </div>

        <div class="form-field" id="reminder-assign-field" style="display:none;">
          <label for="reminder-assign-to">Assign To</label>
          <select id="reminder-assign-to">
