<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — SafiTrack</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="assets/icons/whiteblue.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="landing.css">
    <style>
        .not-found-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
            background: var(--bg-primary);
        }

        .nf-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
            color: var(--border-color);
            margin-bottom: 8px;
            font-family: var(--font-family);
        }

        .nf-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 12px;
            font-family: var(--font-family);
        }

        .nf-desc {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
            margin: 0 auto 36px;
            font-family: var(--font-family);
        }

        .nf-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 56px;
        }

        .nf-btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            background: var(--text-primary);
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            font-family: var(--font-family);
            transition: opacity 0.15s ease;
        }
        .nf-btn-primary:hover { opacity: 0.85; }

        .nf-btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            font-family: var(--font-family);
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        .nf-btn-secondary:hover { background: var(--bg-secondary); border-color: var(--text-muted); }

        .nf-links-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-family: var(--font-family);
        }

        .nf-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nf-link {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-family);
            transition: color 0.15s ease, border-color 0.15s ease;
        }
        .nf-link:hover { color: var(--text-primary); border-color: var(--text-muted); }

        .nf-logo {
            margin-bottom: 48px;
        }
        .nf-logo img {
            height: 32px;
            opacity: 0.7;
        }

        /* Decorative pipeline visual */
        .nf-visual {
            margin-bottom: 32px;
        }

        @media (max-width: 480px) {
            .nf-code { font-size: 80px; letter-spacing: -2px; }
            .nf-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="not-found-page">

        <div class="nf-logo">
            <a href="/">
                <img src="assets/icons/transparentMain.png" alt="SafiTrack">
            </a>
        </div>


        <div class="nf-code">404</div>
        <h1 class="nf-title">This page doesn't exist</h1>
        <p class="nf-desc">Looks like this deal fell through the cracks. Let's get you back on track.</p>

        <div class="nf-actions">
            <a href="/" class="nf-btn-primary">
                Back to home
            </a>
            <a href="/crm/" class="nf-btn-secondary">
                Open app
            </a>
        </div>

        <div class="nf-links-label">Or find what you're looking for</div>
        <div class="nf-links">
            <a href="/pages/features/mainfeatures.html" class="nf-link">Features</a>
            <a href="/pages/pricing.html" class="nf-link">Pricing</a>
            <a href="/pages/documentation.html" class="nf-link">Documentation</a>
            <a href="/pages/helpcenter.html" class="nf-link">Help Center</a>
            <a href="/pages/blog.html" class="nf-link">Blog</a>
            <a href="/pages/status.html" class="nf-link">Status</a>
        </div>

    </div>
</body>
</html>
